version: "3.8"

# =============================================================================
# Evo CRM Community — Docker Swarm Stack
# =============================================================================
# Deploy:
#   docker stack deploy -c docker-compose.swarm.yaml evocrm
#
# Prerequisites:
#   - Docker Swarm initialized (docker swarm init)
#   - External network "network_public" created
#   - Traefik running on the swarm for TLS termination
#
# Only 2 public domains needed:
#   - FRONTEND_DOMAIN  → evocrm_frontend  (React app)
#   - API_DOMAIN       → evocrm_gateway   (Nginx → all backend services)
#
# Required environment variables (set via .env file or export):
#   - API_DOMAIN, FRONTEND_DOMAIN
#   - SECRET_KEY_BASE, JWT_SECRET_KEY, DOORKEEPER_JWT_SECRET_KEY
#   - EVOAI_CRM_API_TOKEN, ENCRYPTION_KEY, BOT_RUNTIME_SECRET
#   - POSTGRES_HOST, POSTGRES_PORT, POSTGRES_USERNAME, POSTGRES_PASSWORD, POSTGRES_DATABASE
#   - REDIS_URL (or REDIS_HOST + REDIS_PORT + REDIS_PASSWORD)
#   - OAUTH_REDIRECT_URI
# =============================================================================

services:
  # ---------------------------------------------------------------------------
  # API Gateway (Nginx) — single entrypoint for all backend services
  # ---------------------------------------------------------------------------
  evocrm_gateway:
    image: ghcr.io/rogermello25/evocrm/evo-gateway-fixed:latest
    networks:
      - network_public
    deploy:
      replicas: 1
      placement:
        constraints:
          - node.hostname == roih-vps
      restart_policy:
        condition: any
      labels:
        - traefik.enable=true
        - traefik.docker.network=network_public
        - traefik.http.routers.evocrm_gateway.rule=Host(`${API_DOMAIN}`)
        - traefik.http.routers.evocrm_gateway.entrypoints=websecure
        - traefik.http.routers.evocrm_gateway.tls.certresolver=letsencryptresolver
        - traefik.http.routers.evocrm_gateway.service=evocrm_gateway
        - traefik.http.services.evocrm_gateway.loadbalancer.server.port=3030
        - traefik.http.services.evocrm_gateway.loadbalancer.passHostHeader=true

  # ---------------------------------------------------------------------------
  # Auth Service (Ruby / Rails) — Port 3001
  # ---------------------------------------------------------------------------
  evocrm_auth:
    image: ghcr.io/rogermello25/evocrm/evo-auth-fixed:latest
    command: bash -c "bundle exec rails db:migrate 2>&1 || echo 'Migration had errors, continuing...'; bundle exec rails s -p 3001 -b 0.0.0.0"
    healthcheck:
      test: ["CMD-SHELL", "curl -fsS http://localhost:3001/health >/dev/null || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 180s
    environment:
      RAILS_ENV: production
      RAILS_MAX_THREADS: 5
      SECRET_KEY_BASE: ${SECRET_KEY_BASE}
      JWT_SECRET_KEY: ${JWT_SECRET_KEY}
      EVOAI_CRM_API_TOKEN: ${EVOAI_CRM_API_TOKEN}
      POSTGRES_HOST: ${POSTGRES_HOST}
      POSTGRES_PORT: ${POSTGRES_PORT:-5432}
      POSTGRES_USERNAME: ${POSTGRES_USERNAME}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DATABASE: ${POSTGRES_DATABASE:-evo_community}
      POSTGRES_SSLMODE: ${POSTGRES_SSLMODE:-require}
      REDIS_URL: ${REDIS_URL}
      FRONTEND_URL: https://${FRONTEND_DOMAIN}
      BACKEND_URL: https://${API_DOMAIN}
      CORS_ORIGINS: https://${FRONTEND_DOMAIN},https://${API_DOMAIN}
      MAILER_SENDER_EMAIL: ${MAILER_SENDER_EMAIL:-noreply@evoai.local}
      SMTP_ADDRESS: ${SMTP_ADDRESS:-}
      SMTP_PORT: ${SMTP_PORT:-587}
      SMTP_DOMAIN: ${SMTP_DOMAIN:-}
      SMTP_AUTHENTICATION: ${SMTP_AUTHENTICATION:-plain}
      SMTP_ENABLE_STARTTLS_AUTO: ${SMTP_ENABLE_STARTTLS_AUTO:-true}
      SMTP_USERNAME: ${SMTP_USERNAME:-}
      SMTP_PASSWORD: ${SMTP_PASSWORD:-}
      DOORKEEPER_JWT_SECRET_KEY: ${DOORKEEPER_JWT_SECRET_KEY}
      DOORKEEPER_JWT_ALGORITHM: hs256
      DOORKEEPER_JWT_ISS: evo-auth-service
      MFA_ISSUER: ${MFA_ISSUER:-EvoCRM}
      SIDEKIQ_CONCURRENCY: ${SIDEKIQ_CONCURRENCY:-10}
      ACTIVE_STORAGE_SERVICE: ${ACTIVE_STORAGE_SERVICE:-local}

    networks:
      - network_public
    stop_grace_period: 300s
    volumes:
      - /root/evocrm-storage/auth:/app/storage
    deploy:
      replicas: 1
      placement:
        constraints:
          - node.hostname == roih-vps
      restart_policy:
        condition: any

  evocrm_auth_sidekiq:
    image: ghcr.io/rogermello25/evocrm/evo-auth-fixed:latest
    command: ["bundle", "exec", "sidekiq", "-C", "config/sidekiq.yml"]
    healthcheck:
      disable: true
    environment:
      RAILS_ENV: production
      SECRET_KEY_BASE: ${SECRET_KEY_BASE}
      JWT_SECRET_KEY: ${JWT_SECRET_KEY}
      EVOAI_CRM_API_TOKEN: ${EVOAI_CRM_API_TOKEN}
      POSTGRES_HOST: ${POSTGRES_HOST}
      POSTGRES_PORT: ${POSTGRES_PORT:-5432}
      POSTGRES_USERNAME: ${POSTGRES_USERNAME}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DATABASE: ${POSTGRES_DATABASE:-evo_community}
      POSTGRES_SSLMODE: ${POSTGRES_SSLMODE:-require}
      REDIS_URL: ${REDIS_URL}
      CORS_ORIGINS: https://${FRONTEND_DOMAIN},https://${API_DOMAIN}
      SMTP_ADDRESS: ${SMTP_ADDRESS:-}
      SMTP_PORT: ${SMTP_PORT:-587}
      SMTP_DOMAIN: ${SMTP_DOMAIN:-}
      SMTP_AUTHENTICATION: ${SMTP_AUTHENTICATION:-plain}
      SMTP_ENABLE_STARTTLS_AUTO: ${SMTP_ENABLE_STARTTLS_AUTO:-true}
      SMTP_USERNAME: ${SMTP_USERNAME:-}
      SMTP_PASSWORD: ${SMTP_PASSWORD:-}
      DOORKEEPER_JWT_SECRET_KEY: ${DOORKEEPER_JWT_SECRET_KEY}
      DOORKEEPER_JWT_ALGORITHM: hs256
      DOORKEEPER_JWT_ISS: evo-auth-service
      MFA_ISSUER: ${MFA_ISSUER:-EvoCRM}
      SIDEKIQ_CONCURRENCY: ${SIDEKIQ_CONCURRENCY:-10}
      ACTIVE_STORAGE_SERVICE: ${ACTIVE_STORAGE_SERVICE:-local}
    networks:
      - network_public
    stop_grace_period: 300s
    volumes:
      - /root/evocrm-storage/auth:/app/storage
    deploy:
      replicas: 1
      placement:
        constraints:
          - node.hostname == roih-vps
      restart_policy:
        condition: any

  # ---------------------------------------------------------------------------
  # CRM Service (Ruby / Rails) — Port 3000
  # ---------------------------------------------------------------------------
  evocrm_crm:
    image: ghcr.io/rogermello25/evocrm/evo-crm-fixed:latest
    command: sh -c "until wget -qO- http://evocrm_auth:3001/health >/dev/null 2>&1; do echo 'Waiting for auth...'; sleep 5; done; bundle exec rails db:migrate 2>&1 || echo 'Migration had errors, continuing...'; bundle exec rails s -p 3000 -b 0.0.0.0"
    environment:
      RAILS_ENV: production
      RAILS_SERVE_STATIC_FILES: "true"
      RAILS_LOG_TO_STDOUT: "true"
      SECRET_KEY_BASE: ${SECRET_KEY_BASE}
      JWT_SECRET_KEY: ${JWT_SECRET_KEY}
      EVOAI_CRM_API_TOKEN: ${EVOAI_CRM_API_TOKEN}
      POSTGRES_HOST: ${POSTGRES_HOST}
      POSTGRES_PORT: ${POSTGRES_PORT:-5432}
      POSTGRES_USERNAME: ${POSTGRES_USERNAME}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DATABASE: ${POSTGRES_DATABASE:-evo_community}
      POSTGRES_SSLMODE: ${POSTGRES_SSLMODE:-require}
      REDIS_URL: ${REDIS_URL}
      EVO_AUTH_SERVICE_URL: http://evocrm_auth:3001
      EVO_AI_CORE_SERVICE_URL: http://evocrm_core:5555
      BACKEND_URL: https://${API_DOMAIN}
      FRONTEND_URL: https://${FRONTEND_DOMAIN}
      CORS_ORIGINS: https://${FRONTEND_DOMAIN},https://${API_DOMAIN}
      DISABLE_TELEMETRY: "true"
      LOG_LEVEL: info
      ENABLE_ACCOUNT_SIGNUP: "true"
      ENABLE_PUSH_RELAY_SERVER: "true"
      ENABLE_INBOX_EVENTS: "true"
      BOT_RUNTIME_URL: http://evocrm_bot_runtime:8080
      BOT_RUNTIME_SECRET: ${BOT_RUNTIME_SECRET}
      BOT_RUNTIME_POSTBACK_BASE_URL: http://evocrm_crm:3000
      ACTIVE_STORAGE_SERVICE: ${ACTIVE_STORAGE_SERVICE:-local}
    networks:
      - network_public
    volumes:
      - /root/evocrm-storage/crm:/app/storage
    deploy:
      replicas: 1
      placement:
        constraints:
          - node.hostname == roih-vps
      restart_policy:
        condition: any

  evocrm_crm_sidekiq:
    image: ghcr.io/rogermello25/evocrm/evo-crm-fixed:latest
    command: ["bundle", "exec", "sidekiq", "-C", "config/sidekiq.yml"]
    environment:
      RAILS_ENV: production
      SECRET_KEY_BASE: ${SECRET_KEY_BASE}
      JWT_SECRET_KEY: ${JWT_SECRET_KEY}
      EVOAI_CRM_API_TOKEN: ${EVOAI_CRM_API_TOKEN}
      POSTGRES_HOST: ${POSTGRES_HOST}
      POSTGRES_PORT: ${POSTGRES_PORT:-5432}
      POSTGRES_USERNAME: ${POSTGRES_USERNAME}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DATABASE: ${POSTGRES_DATABASE:-evo_community}
      POSTGRES_SSLMODE: ${POSTGRES_SSLMODE:-require}
      REDIS_URL: ${REDIS_URL}
      EVO_AUTH_SERVICE_URL: http://evocrm_auth:3001
      EVO_AI_CORE_SERVICE_URL: http://evocrm_core:5555
      CORS_ORIGINS: https://${FRONTEND_DOMAIN},https://${API_DOMAIN}
      BOT_RUNTIME_URL: http://evocrm_bot_runtime:8080
      BOT_RUNTIME_SECRET: ${BOT_RUNTIME_SECRET}
      BOT_RUNTIME_POSTBACK_BASE_URL: http://evocrm_crm:3000
      ACTIVE_STORAGE_SERVICE: ${ACTIVE_STORAGE_SERVICE:-local}
    networks:
      - network_public
    volumes:
      - /root/evocrm-storage/crm:/app/storage
    deploy:
      replicas: 1
      placement:
        constraints:
          - node.hostname == roih-vps
      restart_policy:
        condition: any

  # ---------------------------------------------------------------------------
  # Core Service (Go / Gin) — Port 5555
  # ---------------------------------------------------------------------------
  evocrm_core:
    image: ghcr.io/rogermello25/evocrm/evo-core-fixed:latest
    environment:
      DB_HOST: ${POSTGRES_HOST}
      DB_PORT: ${POSTGRES_PORT:-5432}
      DB_USER: ${POSTGRES_USERNAME}
      DB_PASSWORD: ${POSTGRES_PASSWORD}
      DB_NAME: ${POSTGRES_DATABASE:-evo_community}
      DB_SSLMODE: ${POSTGRES_SSLMODE:-require}
      DB_MAX_IDLE_CONNS: 10
      DB_MAX_OPEN_CONNS: 100
      DB_CONN_MAX_LIFETIME: 1h
      DB_CONN_MAX_IDLE_TIME: 30m
      PORT: "5555"
      SECRET_KEY_BASE: ${SECRET_KEY_BASE}
      JWT_SECRET_KEY: ${JWT_SECRET_KEY}
      JWT_ALGORITHM: HS256
      ENCRYPTION_KEY: ${ENCRYPTION_KEY}
      EVOLUTION_BASE_URL: http://evocrm_crm:3000
      EVO_AUTH_BASE_URL: http://evocrm_auth:3001
      AI_PROCESSOR_URL: http://evocrm_processor:8000
      AI_PROCESSOR_VERSION: v1
    networks:
      - network_public
    deploy:
      replicas: 1
      placement:
        constraints:
          - node.hostname == roih-vps
      restart_policy:
        condition: any

  # ---------------------------------------------------------------------------
  # Processor Service (Python / FastAPI) — Port 8000
  # ---------------------------------------------------------------------------
  evocrm_processor:
    image: ghcr.io/rogermello25/evocrm/evo-processor-fixed:latest
    command: sh -c "alembic upgrade head 2>&1 || echo 'Alembic migration had errors, continuing...'; python -m scripts.run_seeders; uvicorn src.main:app --host $$HOST --port $$PORT"
    environment:
      POSTGRES_CONNECTION_STRING: ${PROCESSOR_POSTGRES_CONNECTION_STRING}
      REDIS_HOST: ${PROCESSOR_REDIS_HOST}
      REDIS_PORT: ${PROCESSOR_REDIS_PORT:-6379}
      REDIS_PASSWORD: ${PROCESSOR_REDIS_PASSWORD}
      REDIS_SSL: "false"
      REDIS_DB: ${PROCESSOR_REDIS_DB:-0}
      REDIS_KEY_PREFIX: "a2a:"
      REDIS_TTL: 3600
      HOST: 0.0.0.0
      PORT: "8000"
      DEBUG: "false"
      SECRET_KEY_BASE: ${SECRET_KEY_BASE}
      ENCRYPTION_KEY: ${ENCRYPTION_KEY}
      EVOAI_CRM_API_TOKEN: ${EVOAI_CRM_API_TOKEN}
      EVO_AI_CRM_URL: http://evocrm_crm:3000
      EVO_AUTH_BASE_URL: http://evocrm_auth:3001
      CORE_SERVICE_URL: http://evocrm_core:5555/api/v1
      APP_URL: https://${API_DOMAIN}
      API_TITLE: Agent Processor Community
      API_DESCRIPTION: Agent Processor Community for Evo AI
      API_VERSION: 1.0.0
      API_URL: https://${API_DOMAIN}
      ORGANIZATION_NAME: ${ORGANIZATION_NAME:-Evo CRM}
      TOOLS_CACHE_ENABLED: "true"
      TOOLS_CACHE_TTL: 3600
      KNOWLEDGE_SERVICE_URL: "http://evocrm_knowledge:8001/api/v1"
      KNOWLEDGE_SERVICE_API_TOKEN: ${EVOAI_CRM_API_TOKEN}
      MEMORY_ENABLED: "true"
      MEMORY_SERVICE_TYPE: "http"
    volumes:
      - evo_processor_logs:/app/logs
    networks:
      - network_public
    deploy:
      replicas: 1
      placement:
        constraints:
          - node.hostname == roih-vps
      restart_policy:
        condition: any

  # ---------------------------------------------------------------------------
  # Knowledge / Memory Service (Python / FastAPI) — Port 8001
  # ---------------------------------------------------------------------------
  evocrm_knowledge:
    image: ghcr.io/rogermello25/evocrm/evo-knowledge-service:latest
    environment:
      DATABASE_URL: ${PROCESSOR_POSTGRES_CONNECTION_STRING}
      SERVICE_TOKEN: ${EVOAI_CRM_API_TOKEN}
      HOST: 0.0.0.0
      PORT: "8001"
    healthcheck:
      test: ["CMD-SHELL", "curl -fsS http://localhost:8001/health >/dev/null || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 60s
    networks:
      - network_public
      - roihnet
    deploy:
      replicas: 1
      placement:
        constraints:
          - node.hostname == roih-vps
      restart_policy:
        condition: any

  # ---------------------------------------------------------------------------
  # Bot Runtime (Go / Gin) — Port 8080
  # ---------------------------------------------------------------------------
  evocrm_bot_runtime:
    image: ghcr.io/rogermello25/evocrm/evo-bot-runtime-fixed:latest
    environment:
      LISTEN_ADDR: 0.0.0.0:8080
      REDIS_URL: ${REDIS_URL}
      AI_PROCESSOR_URL: http://evocrm_processor:8000
      BOT_RUNTIME_SECRET: ${BOT_RUNTIME_SECRET}
      AI_CALL_TIMEOUT_SECONDS: 30
    networks:
      - network_public
      - roihnet
    deploy:
      replicas: 1
      placement:
        constraints:
          - node.hostname == roih-vps
      restart_policy:
        condition: any

  # ---------------------------------------------------------------------------
  # Frontend (React / Vite / Nginx) — Port 80
  # ---------------------------------------------------------------------------
  evocrm_frontend:
    image: ghcr.io/rogermello25/evocrm/evo-frontend-fixed:latest
    environment:
      VITE_APP_ENV: production
      VITE_API_URL: https://${API_DOMAIN}
      VITE_AUTH_API_URL: https://${API_DOMAIN}
      VITE_EVOAI_API_URL: https://${API_DOMAIN}
      VITE_AGENT_PROCESSOR_URL: https://${API_DOMAIN}
      VITE_WS_URL: https://${API_DOMAIN}
      VITE_EVOLUTION_API_URL: https://${API_DOMAIN}

  # ---------------------------------------------------------------------------
  # Evolution API (Node.js / TypeScript) — Port 8080
  # ---------------------------------------------------------------------------
  evocrm_evolution_api:
    image: ghcr.io/rogermello25/evocrm/evo-evolution-api:latest
    command: sh -c ". ./Docker/scripts/deploy_database.sh && npm run start:prod"
    environment:
      SERVER_NAME: evolution
      SERVER_TYPE: http
      SERVER_PORT: 8080
      DATABASE_PROVIDER: postgresql
      DATABASE_CONNECTION_URI: ${PROCESSOR_POSTGRES_CONNECTION_STRING}
      POSTGRES_DATABASE: evocrm
      POSTGRES_USERNAME: ${POSTGRES_USERNAME}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      CORS_ORIGIN: '*'
      DEL_INSTANCE: false
      DATABASE_SAVE_DATA_INSTANCE: true
      DATABASE_SAVE_DATA_NEW_MESSAGE: true
      DATABASE_SAVE_MESSAGE_UPDATE: true
      DATABASE_SAVE_DATA_CONTACTS: true
      DATABASE_SAVE_DATA_CHATS: true
      DATABASE_SAVE_DATA_LABELS: true
      DATABASE_SAVE_DATA_HISTORIC: true
      DATABASE_SAVE_IS_ON_WHATSAPP: true
      DATABASE_DELETE_MESSAGE: true
      LOG_LEVEL: ERROR,WARN,INFO
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:8080 >/dev/null || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 60s
    networks:
      - network_public
      - roihnet
    deploy:
      replicas: 1
      placement:
        constraints:
          - node.hostname == roih-vps
      restart_policy:
        condition: any
    networks:
      - network_public
    deploy:
      replicas: 1
      placement:
        constraints:
          - node.hostname == roih-vps
      restart_policy:
        condition: any
      labels:
        - traefik.enable=true
        - traefik.docker.network=network_public
        - traefik.http.routers.evocrm_frontend.rule=Host(`${FRONTEND_DOMAIN}`)
        - traefik.http.routers.evocrm_frontend.entrypoints=websecure
        - traefik.http.routers.evocrm_frontend.tls.certresolver=letsencryptresolver
        - traefik.http.routers.evocrm_frontend.service=evocrm_frontend
        - traefik.http.services.evocrm_frontend.loadbalancer.server.port=80
        - traefik.http.services.evocrm_frontend.loadbalancer.passHostHeader=true

networks:
  network_public:
    external: true
    name: network_public
  roihnet:
    external: true
    name: roihnet

volumes:
  evo_processor_logs:
    external: false
