name: Build & Publish Docker Image to GHCR

on:
  workflow_dispatch:
  push:
    branches: [main]
    paths:
      - 'evo-ai-frontend-community/**'

permissions:
  contents: read
  packages: write

env:
  IMAGE_NAME: ghcr.io/rogermello25/evocrm/evo-frontend-fixed

jobs:
  build:
    name: Build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2

      - uses: docker/setup-buildx-action@b5ca514318bd6ebac0fb2aedd5d36ec1b5c232a2 # v3.10.0

      - uses: docker/login-action@74a5d142397f4f367a81961eba4e8cd7edddf772 # v3.4.0
        with:
          registry: ghcr.io
          username: ${{ secrets.GHCR_USERNAME }}
          password: ${{ secrets.GHCR_TOKEN }}

      - name: Build and push
        id: build
        uses: docker/build-push-action@14487ce63c7a62a4a324b0bfb37086795e31c6c1 # v6.16.0
        with:
          context: ./evo-ai-frontend-community
          file: ./evo-ai-frontend-community/Dockerfile
          platforms: linux/amd64
          push: true
          provenance: false
          build-args: |
            VITE_API_URL=${{ vars.VITE_API_URL }}
            VITE_AUTH_API_URL=${{ vars.VITE_AUTH_API_URL }}
            VITE_WS_URL=${{ vars.VITE_WS_URL }}
            VITE_EVOAI_API_URL=${{ vars.VITE_EVOAI_API_URL }}
            VITE_AGENT_PROCESSOR_URL=${{ vars.VITE_AGENT_PROCESSOR_URL }}
            VITE_EVOLUTION_API_URL=${{ vars.VITE_EVOLUTION_API_URL }}
          tags: |
            ${{ env.IMAGE_NAME }}:latest
            ${{ env.IMAGE_NAME }}:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Image digest
        run: echo "Built image: ${{ steps.build.outputs.digest }}"
