name: Release

on:
  push:
    tags:
      - "v*.*.*"
  workflow_dispatch:
    inputs:
      version:
        description: "Release version without the leading v"
        required: false

env:
  REGISTRY: ghcr.io
  IMAGE_PREFIX: ghcr.io/rogermello25/evocrm

jobs:
  build-and-push:
    name: Build & Push ${{ matrix.service }}
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    strategy:
      matrix:
        include:
          - service: gateway
            image: evo-gateway-fixed
            context: ./nginx
            dockerfile: ./nginx/Dockerfile
          - service: auth
            image: evo-auth-fixed
            context: ./evo-auth-service-community
            dockerfile: ./evo-auth-service-community/Dockerfile
          - service: crm
            image: evo-crm-fixed
            context: ./evo-ai-crm-community
            dockerfile: ./evo-ai-crm-community/docker/Dockerfile
          - service: frontend
            image: evo-frontend-fixed
            context: ./evo-ai-frontend-community
            dockerfile: ./evo-ai-frontend-community/Dockerfile
          - service: processor
            image: evo-processor-fixed
            context: ./evo-ai-processor-community
            dockerfile: ./evo-ai-processor-community/Dockerfile
          - service: core
            image: evo-core-fixed
            context: ./evo-ai-core-service-community
            dockerfile: ./evo-ai-core-service-community/Dockerfile
          - service: bot-runtime
            image: evo-bot-runtime-fixed
            context: ./evo-bot-runtime
            dockerfile: ./evo-bot-runtime/Dockerfile

    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Login to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Resolve version
        id: version
        shell: bash
        run: |
          if [[ "${GITHUB_REF_TYPE}" == "tag" ]]; then
            echo "version=${GITHUB_REF_NAME#v}" >> "$GITHUB_OUTPUT"
          elif [[ -n "${{ inputs.version }}" ]]; then
            echo "version=${{ inputs.version }}" >> "$GITHUB_OUTPUT"
          else
            echo "version=manual-${GITHUB_RUN_NUMBER}" >> "$GITHUB_OUTPUT"
          fi

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: ${{ matrix.context }}
          file: ${{ matrix.dockerfile }}
          push: true
          tags: |
            ${{ env.IMAGE_PREFIX }}/${{ matrix.image }}:${{ steps.version.outputs.version }}
            ${{ env.IMAGE_PREFIX }}/${{ matrix.image }}:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max

  create-release:
    name: Create GitHub Release
    if: github.ref_type == 'tag'
    needs: build-and-push
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          body: |
            ## Docker Images

            ```bash
            docker pull ghcr.io/rogermello25/evocrm/evo-gateway-fixed:${{ github.ref_name }}
            docker pull ghcr.io/rogermello25/evocrm/evo-auth-fixed:${{ github.ref_name }}
            docker pull ghcr.io/rogermello25/evocrm/evo-crm-fixed:${{ github.ref_name }}
            docker pull ghcr.io/rogermello25/evocrm/evo-frontend-fixed:${{ github.ref_name }}
            docker pull ghcr.io/rogermello25/evocrm/evo-processor-fixed:${{ github.ref_name }}
            docker pull ghcr.io/rogermello25/evocrm/evo-core-fixed:${{ github.ref_name }}
            docker pull ghcr.io/rogermello25/evocrm/evo-bot-runtime-fixed:${{ github.ref_name }}
            ```
